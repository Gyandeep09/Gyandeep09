<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 100 125" width="100" height="100">
  <defs>
    <linearGradient id="neonPulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF">
        <animate attributeName="stop-color" values="#00C9FF;#92FE9D;#FC466B;#3F5EFB;#00C9FF" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#92FE9D">
        <animate attributeName="stop-color" values="#92FE9D;#FC466B;#3F5EFB;#00C9FF;#92FE9D" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,3; 0,-3; 0,3" dur="4s" repeatCount="indefinite"/>
    
    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#neonPulse)" stroke-width="2" stroke-dasharray="8 6">
       <animateTransform attributeName="transform" type="rotate" values="0 50 50; 360 50 50" dur="15s" repeatCount="indefinite" />
    </circle>
    
    <polygon points="50,18 78,34 78,66 50,82 22,66 22,34" fill="none" stroke="url(#neonPulse)" stroke-width="2.5">
       <animateTransform attributeName="transform" type="rotate" values="360 50 50; 0 50 50" dur="10s" repeatCount="indefinite" />
    </polygon>
    
    <circle cx="50" cy="50" r="10" fill="url(#neonPulse)">
       <animate attributeName="r" values="8;13;8" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
